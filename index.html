<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psychomaster AI - Powered by Gemini</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; transition: all 0.3s; }
        .loader { border-top-color: #4f46e5; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">

    <div id="app" class="max-w-2xl mx-auto p-6">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-black text-indigo-700">Psychomaster <span class="text-indigo-400">AI</span></h1>
            <p class="text-gray-500">מחולל שאלות פסיכומטרי חכם</p>
        </header>

        <div id="setup-card" class="bg-white shadow-xl rounded-2xl p-8 border border-gray-100">
            <div id="stats-container" class="mb-8 hidden">
                <h3 class="text-lg font-bold mb-2 text-center">התקדמות אחוזי הצלחה לאורך זמן</h3>
                <canvas id="progressChart" height="100"></canvas>
                <div class="text-center mt-2 text-sm text-gray-500">
                    סה"כ שאלות שנענו: <span id="total-answered" class="font-bold">0</span> | 
                    כפתור <button onclick="clearHistory()" class="text-red-500 hover:underline">איפוס נתונים</button>
                </div>
            </div>

            <h2 class="text-xl font-bold mb-4 border-t pt-4">הגדרת תרגול חדש</h2>
            <div class="space-y-4">
                <input type="password" id="api-key" placeholder="הכנס API Key של Google AI" 
                       class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                <select id="category" class="w-full p-3 border rounded-lg bg-white">
                    <option value="חשיבה מילולית (אנלוגיות והסקה לוגית)">חשיבה מילולית</option>
                    <option value="חשיבה כמותית (אלגברה, גיאומטריה והספק)">חשיבה כמותית</option>
                    <option value="אנגלית (Sentence Completion and Restatements)">אנגלית</option>
                </select>
                <button onclick="generateNewQuestion()" id="start-btn" 
                        class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 transition">
                    ייצר שאלה חדשה (AI)
                </button>
            </div>
        </div>

        <div id="loading" class="hidden text-center py-20">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4 mx-auto"></div>
            <p class="text-indigo-600 font-bold animate-pulse">Gemini מנתח ומייצר שאלה מאתגרת...</p>
        </div>

        <div id="question-card" class="hidden bg-white shadow-2xl rounded-2xl p-8 border-t-4 border-indigo-500">
            <div id="q-timer" class="text-left text-red-500 font-mono font-bold mb-2 text-lg">00:00</div>
            <div id="q-text" class="text-xl font-bold mb-8 leading-relaxed"></div>
            <div id="options" class="space-y-3"></div>
            <div id="feedback" class="hidden mt-6 p-4 rounded-lg"></div>
            <button onclick="location.reload()" class="mt-8 w-full bg-gray-100 text-indigo-600 font-bold py-3 rounded-lg hover:bg-gray-200 transition">
                חזור למסך הראשי
            </button>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        let timerInterval;
        let seconds = 0;
        let chartInstance = null;

        // טעינת מפתח API שמור אם יש
        document.addEventListener("DOMContentLoaded", () => {
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) document.getElementById('api-key').value = savedKey;
            renderChart();
        });

        window.generateNewQuestion = async () => {
            const apiKey = document.getElementById('api-key').value.trim();
            if (!apiKey) return alert("אנא הכנס API Key");
            
            // שמירת המפתח לשימוש עתידי (נשמר רק אצלך בדפדפן)
            localStorage.setItem('gemini_api_key', apiKey);

            const category = document.getElementById('category').value;
            
            document.getElementById('setup-card').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');

            try {
                const genAI = new GoogleGenerativeAI(apiKey);
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-pro" });

                const prompt = `אתה כותב שאלות פסיכומטרי ברמה של ציון 750-800 עבור המרכז הארצי לבחינות ולהערכה.
                צור שאלה אחת בנושא: ${category}.
                השאלה חייבת להיות קשה, עם מסיחים מבלבלים, והסבר לוגי מעמיק למה התשובה הנכונה היא הנכונה ולמה המסיחים שגויים.
                החזר אך ורק פורמט JSON תקין כזה ללא שום טקסט נוסף וללא פורמט Markdown (ללא סימון \`\`\`json):
                {"question": "טקסט", "options": ["1","2","3","4"], "correct": 0, "explanation": "הסבר"}`;

                const result = await model.generateContent(prompt);
                const response = await result.response;
                let responseText = response.text().trim();
                
                // ניקוי עטיפות markdown במקרה והמודל הוסיף אותן למרות הבקשה
                if (responseText.startsWith("```json")) {
                    responseText = responseText.replace(/```json\n?/, "").replace(/```$/, "");
                }

                const data = JSON.parse(responseText);
                displayQuestion(data);
            } catch (error) {
                alert("שגיאה בחיבור ל-AI: " + error.message + "\nייתכן שה-API Key שגוי או שיש בעיית רשת.");
                location.reload();
            }
        };

        function displayQuestion(data) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('question-card').classList.remove('hidden');
            document.getElementById('q-text').innerText = data.question;
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            data.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-right p-4 border-2 border-gray-100 rounded-xl hover:bg-indigo-50 transition font-medium";
                btn.innerText = `(${i+1}) ${opt}`;
                btn.onclick = () => {
                    clearInterval(timerInterval);
                    // נטרול הכפתורים
                    document.querySelectorAll('#options button').forEach(b => b.disabled = true);
                    
                    const isCorrect = (i === data.correct);
                    saveResult(isCorrect); // שמירת התוצאה לגרף
                    
                    const feedback = document.getElementById('feedback');
                    feedback.classList.remove('hidden');
                    if(isCorrect) {
                        btn.classList.add('bg-green-100', 'border-green-500');
                        feedback.className = "mt-6 p-4 rounded-lg bg-green-50 text-green-800 font-bold border border-green-200";
                        feedback.innerHTML = "✅ נכון מאוד! <br><span class='font-normal mt-2 block'>" + data.explanation + "</span>";
                    } else {
                        btn.classList.add('bg-red-100', 'border-red-500');
                        optionsDiv.children[data.correct].classList.add('bg-green-100', 'border-green-500');
                        feedback.className = "mt-6 p-4 rounded-lg bg-red-50 text-red-800 font-bold border border-red-200";
                        feedback.innerHTML = "❌ טעות. התשובה הנכונה היא " + (data.correct + 1) + ". <br><span class='font-normal mt-2 block'>" + data.explanation + "</span>";
                    }
                };
                optionsDiv.appendChild(btn);
            });
            startTimer();
        }

        function startTimer() {
            seconds = 0;
            timerInterval = setInterval(() => {
                seconds++;
                const m = Math.floor(seconds/60).toString().padStart(2,'0');
                const s = (seconds%60).toString().padStart(2,'0');
                document.getElementById('q-timer').innerText = `${m}:${s}`;
            }, 1000);
        }

        // --- פונקציות ניהול נתונים וגרף ---

        function saveResult(isCorrect) {
            let history = JSON.parse(localStorage.getItem('psycho_history') || '[]');
            history.push({
                correct: isCorrect,
                timestamp: new Date().toISOString()
            });
            localStorage.setItem('psycho_history', JSON.stringify(history));
        }

        window.clearHistory = () => {
            if(confirm("האם אתה בטוח שברצונך לאפס את כל היסטוריית התרגול שלך?")) {
                localStorage.removeItem('psycho_history');
                renderChart();
            }
        };

        function renderChart() {
            let history = JSON.parse(localStorage.getItem('psycho_history') || '[]');
            
            if (history.length === 0) {
                document.getElementById('stats-container').classList.add('hidden');
                return;
            }

            document.getElementById('stats-container').classList.remove('hidden');
            document.getElementById('total-answered').innerText = history.length;

            // חישוב אחוזי הצלחה מצטברים (Rolling Average)
            let cumulativeRates = [];
            let correctCount = 0;
            
            history.forEach((attempt, index) => {
                if (attempt.correct) correctCount++;
                let rate = Math.round((correctCount / (index + 1)) * 100);
                cumulativeRates.push(rate);
            });

            // יצירת תוויות ציר X (שאלה 1, שאלה 2...)
            const labels = history.map((_, i) => `שאלה ${i + 1}`);

            const ctx = document.getElementById('progressChart').getContext('2d');
            
            if (chartInstance) {
                chartInstance.destroy();
            }

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'אחוז הצלחה מצטבר (%)',
                        data: cumulativeRates,
                        borderColor: '#4f46e5',
                        backgroundColor: 'rgba(79, 70, 229, 0.1)',
                        borderWidth: 3,
                        tension: 0.3,
                        fill: true,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#4f46e5',
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            ticks: {
                                callback: function(value) { return value + "%" }
                            }
                        }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }
    </script>
</body>
</html>
