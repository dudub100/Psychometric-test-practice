<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psychomaster AI - Zero Latency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; transition: all 0.3s; }
        .loader { border-top-color: #4f46e5; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">

    <div id="app" class="max-w-2xl mx-auto p-6">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-black text-indigo-700">Psychomaster <span class="text-green-500">Pro</span></h1>
            <p class="text-gray-500">תרגול ללא המתנה (מצב טעינה מראש)</p>
        </header>

        <div id="setup-card" class="bg-white shadow-xl rounded-2xl p-8 border border-gray-100">
            <div id="stats-container" class="mb-8 hidden">
                <canvas id="progressChart" height="100"></canvas>
                <div class="text-center mt-2 text-sm text-gray-500">
                    סה"כ שאלות: <span id="total-answered" class="font-bold">0</span> | 
                    <button onclick="clearHistory()" class="text-red-500 hover:underline">איפוס נתונים</button>
                </div>
            </div>

            <h2 class="text-xl font-bold mb-4 border-t pt-4">הגדרת תרגול</h2>
            <div class="space-y-4">
                <input type="password" id="api-key" placeholder="הכנס API Key" 
                       class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                <select id="category" class="w-full p-3 border rounded-lg bg-white">
                    <option value="חשיבה מילולית (אנלוגיות והסקה לוגית)">חשיבה מילולית</option>
                    <option value="חשיבה כמותית (אלגברה, גיאומטריה והספק)">חשיבה כמותית</option>
                    <option value="אנגלית (Sentence Completion and Restatements)">אנגלית</option>
                </select>
                <button onclick="startSession()" id="start-btn" 
                        class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 transition">
                    התחל תרגול מיידי
                </button>
            </div>
        </div>

        <div id="loading" class="hidden text-center py-20">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4 mx-auto"></div>
            <p class="text-indigo-600 font-bold animate-pulse">מכין את חבילת השאלות הראשונה...</p>
        </div>

        <div id="question-card" class="hidden bg-white shadow-2xl rounded-2xl p-8 border-t-4 border-indigo-500">
            <div class="flex justify-between items-center mb-4">
                <div id="q-timer" class="text-left text-red-500 font-mono font-bold text-lg">00:00</div>
                <div id="buffer-status" class="text-xs text-gray-400">שאלות במחסנית: <span id="queue-count">0</span></div>
            </div>
            <div id="q-text" class="text-xl font-bold mb-8 leading-relaxed"></div>
            <div id="options" class="space-y-3"></div>
            <div id="feedback" class="hidden mt-6 p-4 rounded-lg"></div>
            <button id="next-btn" onclick="showNextQuestion()" class="hidden mt-8 w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition">
                לשאלה הבאה (מיידי) ⮕
            </button>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        let timerInterval;
        let seconds = 0;
        let chartInstance = null;
        
        let questionsQueue = []; // מחסנית השאלות
        let isFetching = false;  // מגן מפני כפילות בקשות ברקע
        let currentCategory = "";

        document.addEventListener("DOMContentLoaded", () => {
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) document.getElementById('api-key').value = savedKey;
            renderChart();
        });

        // פונקציית התחלת הסשן
        window.startSession = async () => {
            const apiKey = document.getElementById('api-key').value.trim();
            if (!apiKey) return alert("אנא הכנס API Key");
            localStorage.setItem('gemini_api_key', apiKey);
            
            currentCategory = document.getElementById('category').value;
            questionsQueue = [];
            
            document.getElementById('setup-card').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');

            await fetchQuestionsBatch(true); // טעינה ראשונית
        };

        // פונקציה להבאת חבילת שאלות (5 בכל פעם)
        async function fetchQuestionsBatch(isInitial = false) {
            if (isFetching) return;
            isFetching = true;
            
            const apiKey = localStorage.getItem('gemini_api_key');
            const genAI = new GoogleGenerativeAI(apiKey);
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

            const prompt = `אתה כותב שאלות פסיכומטרי ברמה של ציון 750-800.
            צור 5 שאלות שונות בנושא: ${currentCategory}.
            החזר אך ורק פורמט JSON של מערך (Array) של אובייקטים, ללא שום טקסט נוסף:
            [
              {"question": "טקסט", "options": ["1","2","3","4"], "correct": 0, "explanation": "הסבר"},
              ...
            ]`;

            try {
                const result = await model.generateContent(prompt);
                let text = (await result.response).text().trim();
                if (text.startsWith("```json")) text = text.replace(/```json\n?/, "").replace(/```$/, "");
                else if (text.startsWith("```")) text = text.replace(/```\n?/, "").replace(/```$/, "");

                const newQuestions = JSON.parse(text);
                questionsQueue.push(...newQuestions);
                
                document.getElementById('queue-count').innerText = questionsQueue.length;

                if (isInitial) {
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('question-card').classList.remove('hidden');
                    showNextQuestion();
                }
            } catch (error) {
                console.error("Batch fetch failed:", error);
                if (isInitial) {
                    alert("שגיאה בטעינה הראשונית. נסה שוב.");
                    location.reload();
                }
            } finally {
                isFetching = false;
            }
        }

        window.showNextQuestion = () => {
            if (questionsQueue.length === 0) {
                document.getElementById('question-card').classList.add('hidden');
                document.getElementById('loading').classList.remove('hidden');
                return; // יחכה שהטעינה תסתיים
            }

            const data = questionsQueue.shift();
            document.getElementById('queue-count').innerText = questionsQueue.length;

            // בדיקה אם צריך להטעין עוד שאלות ברקע (אם נשארו פחות מ-3)
            if (questionsQueue.length < 3) {
                fetchQuestionsBatch(false); 
            }

            // הצגת השאלה
            document.getElementById('q-text').innerHTML = data.question.replace(/\n/g, '<br>');
            document.getElementById('feedback').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            data.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-right p-4 border-2 border-gray-100 rounded-xl hover:bg-indigo-50 transition font-medium";
                btn.innerText = `(${i+1}) ${opt}`;
                btn.onclick = () => {
                    clearInterval(timerInterval);
                    document.querySelectorAll('#options button').forEach(b => b.disabled = true);
                    
                    const isCorrect = (i === data.correct);
                    saveResult(isCorrect);
                    
                    const feedback = document.getElementById('feedback');
                    feedback.classList.remove('hidden');
                    document.getElementById('next-btn').classList.remove('hidden');

                    if(isCorrect) {
                        btn.classList.add('bg-green-100', 'border-green-500');
                        feedback.className = "mt-6 p-4 rounded-lg bg-green-50 text-green-800 font-bold border border-green-200";
                        feedback.innerHTML = "✅ נכון מאוד! <br><span class='font-normal mt-2 block'>" + data.explanation + "</span>";
                    } else {
                        btn.classList.add('bg-red-100', 'border-red-500');
                        optionsDiv.children[data.correct].classList.add('bg-green-100', 'border-green-500');
                        feedback.className = "mt-6 p-4 rounded-lg bg-red-50 text-red-800 font-bold border border-red-200";
                        feedback.innerHTML = "❌ טעות. התשובה הנכונה היא " + (data.correct + 1) + ". <br><span class='font-normal mt-2 block'>" + data.explanation + "</span>";
                    }
                };
                optionsDiv.appendChild(btn);
            });
            startTimer();
        };

        function startTimer() {
            clearInterval(timerInterval);
            seconds = 0;
            timerInterval = setInterval(() => {
                seconds++;
                const m = Math.floor(seconds/60).toString().padStart(2,'0');
                const s = (seconds%60).toString().padStart(2,'0');
                document.getElementById('q-timer').innerText = `${m}:${s}`;
            }, 1000);
        }

        function saveResult(isCorrect) {
            let history = JSON.parse(localStorage.getItem('psycho_history') || '[]');
            history.push({ correct: isCorrect, timestamp: new Date().toISOString() });
            localStorage.setItem('psycho_history', JSON.stringify(history));
            renderChart();
        }

        window.clearHistory = () => {
            if(confirm("לאפס נתונים?")) {
                localStorage.removeItem('psycho_history');
                location.reload();
            }
        };

        function renderChart() {
            let history = JSON.parse(localStorage.getItem('psycho_history') || '[]');
            if (history.length === 0) return;
            document.getElementById('stats-container').classList.remove('hidden');
            document.getElementById('total-answered').innerText = history.length;
            let cumulativeRates = [];
            let correctCount = 0;
            history.forEach((attempt, index) => {
                if (attempt.correct) correctCount++;
                cumulativeRates.push(Math.round((correctCount / (index + 1)) * 100));
            });
            const ctx = document.getElementById('progressChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: history.map((_, i) => i + 1),
                    datasets: [{
                        label: 'הצלחה %', data: cumulativeRates,
                        borderColor: '#4f46e5', backgroundColor: 'rgba(79, 70, 229, 0.1)',
                        fill: true, tension: 0.3
                    }]
                },
                options: { scales: { y: { beginAtZero: true, max: 100 } } }
            });
        }
    </script>
</body>
</html>
